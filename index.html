<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A fast responsive internet radio player with YoRadio playlist import and export."
    />
    <script>
      ;(() => {
        try {
          const stored = localStorage.getItem('wadsradio.theme.v1')
          const mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          const theme =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode

          document.documentElement.dataset.theme = theme
        } catch {
          document.documentElement.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'
        }
      })()
    </script>
    <title>WadsRadio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
